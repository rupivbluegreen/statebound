# Statebound local-development docker-compose.
#
# Phase 8 wave C ships two services: PostgreSQL and the statebound API
# (built from the repo-root Dockerfile). Operators can run the full
# v1.0 deterministic demo with:
#
#   make docker-app-up         # build image, start Postgres + API
#   curl http://localhost:8080/healthz
#   make docker-app-down       # tear it all down
#
# The standalone `make docker-up` / `make docker-down` flow still
# starts only Postgres (the statebound service is ignored when not
# requested by name) so contributors who run the binary on the host
# via `make run-api` are unaffected.

services:
  postgres:
    image: postgres:16-alpine
    container_name: statebound-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: statebound
      POSTGRES_PASSWORD: statebound
      POSTGRES_DB: statebound
    ports:
      - "5432:5432"
    volumes:
      - statebound-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statebound -d statebound"]
      interval: 5s
      timeout: 5s
      retries: 10

  statebound:
    image: statebound:dev
    container_name: statebound-api
    build:
      # Build from the repo root so the Dockerfile can see go.mod,
      # cmd/, internal/, policies/, schemas/, etc.
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # The compose Postgres uses statebound/statebound; this DSN
      # matches the canonical default in the top-level Makefile.
      STATEBOUND_DB_DSN: postgres://statebound:statebound@postgres:5432/statebound?sslmode=disable
      # Dev-token auth: the API requires either OIDC config or a
      # dev token. Compose is for local development, so we set the
      # dev token. Override for any non-local environment.
      STATEBOUND_DEV_TOKEN: local-dev
      STATEBOUND_DEV_ACTOR: human:dev
      # Plan signing requires a key on disk; the compose flow does
      # not provision one. Skip signing locally — never set this in
      # production.
      STATEBOUND_DEV_SKIP_PLAN_SIGNATURE: "true"
      # Bind to all interfaces inside the container so the host port
      # forward can reach it.
      STATEBOUND_API_LISTEN: ":8080"
    ports:
      - "8080:8080"
    # Distroless does not include a shell, so a healthcheck has to
    # invoke the statebound binary directly. `version` is the smallest
    # subcommand that proves the binary still runs.
    healthcheck:
      test: ["CMD", "/usr/local/bin/statebound", "version"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  statebound-pgdata: {}
