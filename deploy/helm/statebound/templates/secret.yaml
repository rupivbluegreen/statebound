{{/*
Secret rendered only when devToken is set. In production the
operator passes secret references via passwordSecretRef and
privateKeySecretRef and this Secret stays empty / absent.
*/}}
{{- if .Values.api.devToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "statebound.fullname" . }}-dev-token
  labels:
    {{- include "statebound.labels" . | nindent 4 }}
type: Opaque
stringData:
  STATEBOUND_DEV_TOKEN: {{ .Values.api.devToken | quote }}
{{- end }}
