apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "statebound.fullname" . }}
  labels:
    {{- include "statebound.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "statebound.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "statebound.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the deployment when the ConfigMap changes so env-var
        # updates do not require a manual restart.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "statebound.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: statebound
          image: {{ include "statebound.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["api", "serve"]
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "statebound.fullname" . }}-config
          env:
            {{- if .Values.api.devToken }}
            - name: STATEBOUND_DEV_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "statebound.fullname" . }}-dev-token
                  key: STATEBOUND_DEV_TOKEN
            {{- end }}
            {{- if and (not .Values.database.dsn) .Values.database.passwordSecretRef.name }}
            - name: STATEBOUND_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecretRef.name }}
                  key: {{ .Values.database.passwordSecretRef.key }}
            {{- end }}
            {{- if .Values.signing.privateKeySecretRef.name }}
            - name: STATEBOUND_SIGNING_KEY_PATH
              value: /etc/statebound/signing/private_key.pem
            {{- end }}
          {{- if .Values.signing.privateKeySecretRef.name }}
          volumeMounts:
            - name: signing-key
              mountPath: /etc/statebound/signing
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- if .Values.signing.privateKeySecretRef.name }}
      volumes:
        - name: signing-key
          secret:
            secretName: {{ .Values.signing.privateKeySecretRef.name }}
            items:
              - key: {{ .Values.signing.privateKeySecretRef.key }}
                path: private_key.pem
            defaultMode: 0400
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
