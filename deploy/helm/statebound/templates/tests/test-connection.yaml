apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "statebound.fullname" . }}-test-connection"
  labels:
    {{- include "statebound.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          curl -fsS "http://{{ include "statebound.fullname" . }}:{{ .Values.service.port }}/healthz" > /dev/null
          curl -fsS "http://{{ include "statebound.fullname" . }}:{{ .Values.service.port }}/readyz" > /dev/null
          echo "statebound API healthy and ready"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
