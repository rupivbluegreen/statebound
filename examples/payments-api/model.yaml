apiVersion: statebound.dev/v1alpha1
kind: ProductAuthorizationModel
metadata:
  product: payments-api
  owner: platform-security
  description: Card-payments API governance baseline
spec:
  assets:
    - name: pay-linux-01
      type: linux-host
      environment: prod
      labels:
        app: payments
        region: eu

  assetScopes:
    - name: prod-linux
      selector:
        type: linux-host
        environment: prod
        app: payments

  entitlements:
    - name: payments-prod-readonly
      owner: payments-team
      purpose: Read-only production troubleshooting
      authorizations:
        - type: linux.ssh
          scope: prod-linux
          methods: [ssh]
        - type: linux.sudo
          scope: prod-linux
          asUser: root
          commands:
            allow:
              - /usr/bin/systemctl status payments
              - /usr/bin/journalctl -u payments --since today
            deny: []

  serviceAccounts:
    - name: payments-batch
      owner: payments-team
      usagePattern: system-to-system
      purpose: Runs scheduled settlement jobs
      authorizations:
        - type: linux.local-group
          scope: prod-linux
          group: payments-runtime
